# Günlük BIST trend taraması
# Ana tarama : hafta içi 17:33 TR (14:33 UTC)
# Yedek      : hafta içi 18:23 TR (15:23 UTC) — ana tarama kaydettiyse
#              script "bugün zaten kayıtlı" deyip dokunmadan çıkar.
# Konum: .github/workflows/daily_scan.yml
#
# Notlar:
# - Türkiye kalıcı UTC+3, cron sabittir, yaz saati derdi yok.
# - GitHub cron'u dakikası dakikasına garanti etmez; birkaç dk kayabilir.
# - Actions sekmesinden elle tetiklerken "force" kutusunu işaretlersen
#   bugünün mevcut kaydının ÜZERİNE yazar (normalde yazmaz).

name: Gunluk BIST Trend Taramasi

on:
  schedule:
    - cron: "33 14 * * 1-5"   # Pzt-Cum 14:33 UTC = 17:33 TR (ana)
    - cron: "23 15 * * 1-5"   # Pzt-Cum 15:23 UTC = 18:23 TR (yedek)
  workflow_dispatch:
    inputs:
      force:
        description: "Bugünün mevcut kaydının üzerine yaz"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v5

      - name: Python kur
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Bağımlılıkları yükle
        run: pip install yfinance pandas numpy

      - name: Taramayı çalıştır
        env:
          FORCE_OVERWRITE: ${{ inputs.force == true && '1' || '' }}
        run: python scripts/daily_scan.py

      - name: Sonucu commit'le ve push'la
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/score_history.json
          if git diff --cached --quiet; then
            echo "Değişiklik yok (zaten kayıtlı / piyasa kapalı) — commit atlanıyor."
          else
            git commit -m "Günlük trend skorları $(TZ=Europe/Istanbul date +'%Y-%m-%d %H:%M')"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push
          fi
